rooms:
  - name: LIVINGROOM
    entry_goal: {x: 3.5, y: 3.0, yaw: 0.0} # World: (0.5, 4.0) -> Map: (3.5, 3.0)
    cleaning_goals:
      - {x: 4.0, y: 3.0, yaw: 0.0}
      - {x: 4.0, y: 4.0, yaw: 1.57}
      - {x: 3.0, y: 4.0, yaw: 3.14}
    qr_expected: "ROOM=LIVINGROOM"

  - name: KITCHEN
    entry_goal: {x: -3.5, y: 2.0, yaw: 3.14} # World: (-6.5, 3.0) -> Map: (-3.5, 2.0)
    cleaning_goals:
      - {x: -4.0, y: 2.0, yaw: 3.14}
      - {x: -4.0, y: 3.0, yaw: 1.57}
      - {x: -3.0, y: 3.0, yaw: 0.0}
    qr_expected: "ROOM=KITCHEN"

  - name: BEDROOM
    entry_goal: {x: -5.5, y: -2.0, yaw: 3.14} # World: (-8.5, -1.0) -> Map: (-5.5, -2.0)
    cleaning_goals:
      - {x: -6.0, y: -2.0, yaw: -1.57}
      - {x: -5.0, y: -2.0, yaw: 0.0}
    qr_expected: "ROOM=BEDROOM"

  - name: CORRIDOR
    entry_goal: {x: 4.0, y: -2.0, yaw: -1.57} # World: (1.0, -1.0) -> Map: (4.0, -2.0)
    cleaning_goals:
      - {x: 4.0, y: -3.0, yaw: -1.57}
    qr_expected: "ROOM=CORRIDOR"
